<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🔢 猜数字</title>
  <link rel="stylesheet" href="/shared/party.css">
</head>
<body>
  <div id="home-screen" class="screen active">
    <div class="container narrow">
      <h1 class="title">🔢 猜数字</h1>
      <p class="subtitle">双人对战，猜对方的4位不重复数字</p>

      <div class="input-group">
        <input type="text" id="player-name" placeholder="输入你的昵称" maxlength="10">
      </div>
      <div class="button-group">
        <button id="create-room-btn" class="btn btn-primary">创建房间</button>
        <button id="join-room-btn" class="btn btn-secondary">加入房间</button>
      </div>
      <div id="join-room-form" class="hidden">
        <div class="input-group">
          <input type="text" id="room-code" placeholder="输入房间号" maxlength="6">
        </div>
        <button id="confirm-join-btn" class="btn btn-primary">确认加入</button>
      </div>
      <a href="/" class="back-link">← 返回游戏大厅</a>
    </div>
  </div>

  <div id="lobby-screen" class="screen">
    <div class="container narrow">
      <div class="room-header">
        <h2>房间号: <span id="room-id-display"></span></h2>
        <button id="copy-room-id" class="btn btn-small btn-secondary">复制</button>
      </div>

      <div class="panel">
        <h3 class="section-title">规则</h3>
        <p class="muted">双方各设置一个4位不重复数字，轮流猜对方数字。</p>
        <p class="muted">A = 数字和位置都对，B = 数字对但位置不对。例：答案 1234，猜 1325，则是 1A2B。</p>
      </div>

      <div class="players-section panel">
        <h3 class="section-title">玩家列表 (<span id="player-count">0</span>/2)</h3>
        <ul id="players-list"></ul>
      </div>

      <div id="host-controls" class="hidden">
        <button id="start-game-btn" class="btn btn-primary">开始游戏</button>
      </div>
      <p id="waiting-message" class="info-text">等待房主开始游戏...</p>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="game-shell">
      <div class="game-topbar">
        <h1 class="game-title">🔢 猜数字</h1>
        <span>房间 <strong id="game-room-id"></strong></span>
      </div>

      <div class="prompt-card">
        <div class="muted">当前状态</div>
        <div id="status-title" class="big">设置数字</div>
        <p id="status-desc" class="muted">请输入自己的秘密数字。</p>
      </div>

      <div id="secret-panel" class="panel hidden">
        <h3 class="section-title">设置秘密数字</h3>
        <div class="input-group">
          <input type="password" id="secret-input" inputmode="numeric" pattern="[0-9]*" placeholder="例如 1234" maxlength="4" autocomplete="off">
        </div>
        <button id="set-secret-btn" class="btn btn-primary">确认秘密数字</button>
        <p class="muted">你的数字只会在游戏结束后公开。</p>
      </div>

      <div id="guess-panel" class="panel hidden">
        <h3 class="section-title">输入猜测</h3>
        <div class="input-group">
          <input type="text" id="guess-input" inputmode="numeric" pattern="[0-9]*" placeholder="猜一个4位不重复数字" maxlength="4" autocomplete="off">
        </div>
        <button id="guess-btn" class="btn btn-success">提交猜测</button>
      </div>

      <div id="game-actions" class="actions"></div>
      <div id="players-grid" class="player-grid"></div>

      <div class="panel">
        <h3 class="section-title">猜测记录</h3>
        <ul id="history-list" class="history-list"></ul>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/session.js"></script>
  <script src="game.js"></script>
</body>
</html>
