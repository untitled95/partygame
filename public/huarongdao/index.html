<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐱 猫咪华容道</title>
  <link rel="stylesheet" href="/shared/party.css">
  <link rel="stylesheet" href="/shared/solo.css">
</head>
<body>
  <div class="screen active">
    <div class="container solo-card">
      <h1 class="title">🐱 猫咪华容道</h1>
      <p class="subtitle">猫 meme 版横刀立马，移动猫猫让老板猫从底部出口突围</p>

      <div class="solo-stats">
        <div class="solo-stat"><span class="label">步数</span><span id="moves" class="value">0</span></div>
        <div class="solo-stat"><span class="label">最佳</span><span id="best-moves" class="value">-</span></div>
        <div class="solo-stat"><span class="label">状态</span><span id="status" class="value">进行中</span></div>
      </div>

      <div id="huarongdao-board" class="huarongdao-board" aria-label="华容道棋盘"></div>

      <div class="huarongdao-controls" aria-label="移动控制">
        <button class="btn btn-secondary control-btn up" data-direction="up" aria-label="向上">↑</button>
        <button class="btn btn-secondary control-btn left" data-direction="left" aria-label="向左">←</button>
        <button class="btn btn-secondary control-btn right" data-direction="right" aria-label="向右">→</button>
        <button class="btn btn-secondary control-btn down" data-direction="down" aria-label="向下">↓</button>
      </div>

      <div class="actions">
        <button id="reset-btn" class="btn btn-primary">重置</button>
        <button id="undo-btn" class="btn btn-warning">撤销</button>
        <a href="/" class="btn btn-secondary" style="text-align:center;text-decoration:none;">返回大厅</a>
      </div>
      <p id="message" class="muted">先点选一只猫，再用方向按钮、键盘方向键或滑动猫猫移动。</p>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
