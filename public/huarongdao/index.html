<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff7ed">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>🐱 猫咪华容道</title>
  <link rel="stylesheet" href="/shared/party.css?v=solo-offline-20260429">
  <link rel="stylesheet" href="/shared/solo.css?v=solo-offline-20260429">
  <link rel="stylesheet" href="/huarongdao/style.css?v=cat-layout-20260429">
</head>
<body>
  <div class="screen active">
    <div class="container solo-card">
      <h1 class="title">🐱 猫咪华容道</h1>
      <p class="subtitle">猫 meme 版横刀立马，移动猫猫让老板猫从底部出口突围</p>

      <div class="solo-stats">
        <div class="solo-stat"><span class="label">步数</span><span id="moves" class="value">0</span></div>
        <div class="solo-stat"><span class="label">最佳</span><span id="best-moves" class="value">-</span></div>
        <div class="solo-stat"><span class="label">状态</span><span id="status" class="value">进行中</span></div>
      </div>

      <div id="huarongdao-board" class="huarongdao-board" aria-label="华容道棋盘"></div>

      <div class="actions">
        <button id="reset-btn" class="btn btn-primary">重置</button>
        <button id="undo-btn" class="btn btn-warning">撤销</button>
        <a href="/" class="btn btn-secondary" style="text-align:center;text-decoration:none;">返回大厅</a>
      </div>
      <p id="message" class="muted">先点选一只猫，电脑用方向键/WASD，手机直接滑动猫猫移动。</p>
    </div>
  </div>
  <script src="/shared/offline-progress.js?v=solo-progress-20260429"></script>
  <script src="game.js?v=solo-offline-20260429"></script>
</body>
</html>
