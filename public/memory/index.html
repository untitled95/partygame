<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff7ed">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>🧠 记忆翻牌</title>
  <link rel="stylesheet" href="/shared/party.css?v=solo-offline-20260429">
  <link rel="stylesheet" href="/shared/solo.css?v=solo-offline-20260429">
</head>
<body>
  <div class="screen active">
    <div class="container solo-card">
      <h1 class="title">🧠 记忆翻牌</h1>
      <p class="subtitle">逐关挑战，找出所有相同图案的牌</p>

      <div class="solo-stats">
        <div class="solo-stat"><span class="label">关卡</span><span id="level" class="value">1/5</span></div>
        <div class="solo-stat"><span class="label">步数</span><span id="moves" class="value">0</span></div>
        <div class="solo-stat"><span class="label">时间</span><span id="timer" class="value">0s</span></div>
        <div class="solo-stat"><span class="label">配对</span><span id="matches" class="value">0/8</span></div>
      </div>

      <div id="memory-board" class="memory-board" aria-label="记忆翻牌棋盘"></div>

      <div class="actions">
        <button id="new-game-btn" class="btn btn-primary">重玩本关</button>
        <button id="next-level-btn" class="btn btn-success" disabled>下一关</button>
        <a href="/" class="btn btn-secondary" style="text-align:center;text-decoration:none;">返回大厅</a>
      </div>
      <p id="message" class="muted">点击两张牌，配对成功后会保留；通关后进入下一关。</p>
    </div>
  </div>
  <script src="/shared/offline-progress.js?v=solo-progress-20260429"></script>
  <script src="game.js?v=solo-offline-20260429"></script>
</body>
</html>
