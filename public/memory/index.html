<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧠 记忆翻牌</title>
  <link rel="stylesheet" href="/shared/party.css">
  <link rel="stylesheet" href="/shared/solo.css">
</head>
<body>
  <div class="screen active">
    <div class="container solo-card">
      <h1 class="title">🧠 记忆翻牌</h1>
      <p class="subtitle">找出所有相同图案的牌</p>

      <div class="solo-stats">
        <div class="solo-stat"><span class="label">步数</span><span id="moves" class="value">0</span></div>
        <div class="solo-stat"><span class="label">时间</span><span id="timer" class="value">0s</span></div>
        <div class="solo-stat"><span class="label">配对</span><span id="matches" class="value">0/8</span></div>
      </div>

      <div id="memory-board" class="memory-board" aria-label="记忆翻牌棋盘"></div>

      <div class="actions">
        <button id="new-game-btn" class="btn btn-primary">重新开始</button>
        <a href="/" class="btn btn-secondary" style="text-align:center;text-decoration:none;">返回大厅</a>
      </div>
      <p id="message" class="muted">点击两张牌，配对成功后会保留。</p>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
