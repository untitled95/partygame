<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff7ed">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>🐍 贪吃蛇</title>
  <link rel="stylesheet" href="/shared/party.css?v=solo-offline-20260429">
  <link rel="stylesheet" href="/shared/solo.css?v=solo-offline-20260429">
</head>
<body>
  <div class="screen active">
    <div class="container solo-card">
      <h1 class="title">🐍 贪吃蛇</h1>
      <p class="subtitle">方向键、WASD 或滑动控制，吃果子会越来越快</p>

      <div class="solo-stats">
        <div class="solo-stat"><span class="label">分数</span><span id="score" class="value">0</span></div>
        <div class="solo-stat"><span class="label">最佳</span><span id="best-score" class="value">0</span></div>
        <div class="solo-stat"><span class="label">状态</span><span id="status" class="value">进行中</span></div>
      </div>

      <div id="snake-board" class="snake-board" aria-label="贪吃蛇棋盘"></div>

      <div class="snake-controls" aria-label="移动控制">
        <button class="btn btn-secondary control-btn up" data-direction="up" aria-label="向上">↑</button>
        <button class="btn btn-secondary control-btn left" data-direction="left" aria-label="向左">←</button>
        <button class="btn btn-secondary control-btn right" data-direction="right" aria-label="向右">→</button>
        <button class="btn btn-secondary control-btn down" data-direction="down" aria-label="向下">↓</button>
      </div>

      <div class="actions">
        <button id="new-game-btn" class="btn btn-primary">新游戏</button>
        <button id="pause-btn" class="btn btn-warning">暂停</button>
        <a href="/" class="btn btn-secondary" style="text-align:center;text-decoration:none;">返回大厅</a>
      </div>
      <p id="message" class="muted">不要撞墙，也不要撞到自己。</p>
    </div>
  </div>
  <script src="/shared/offline.js?v=solo-offline-20260429"></script>
  <script src="game.js?v=solo-offline-20260429"></script>
</body>
</html>
