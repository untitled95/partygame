<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🕵️ 谁是卧底</title>
  <link rel="stylesheet" href="/shared/party.css">
</head>
<body>
  <div id="home-screen" class="screen active">
    <div class="container narrow">
      <h1 class="title">🕵️ 谁是卧底</h1>
      <p class="subtitle">拿到词语，描述、投票，找出卧底</p>

      <div class="input-group">
        <input type="text" id="player-name" placeholder="输入你的昵称" maxlength="10">
      </div>
      <div class="button-group">
        <button id="create-room-btn" class="btn btn-primary">创建房间</button>
        <button id="join-room-btn" class="btn btn-secondary">加入房间</button>
      </div>
      <div id="join-room-form" class="hidden">
        <div class="input-group">
          <input type="text" id="room-code" placeholder="输入房间号" maxlength="6">
        </div>
        <button id="confirm-join-btn" class="btn btn-primary">确认加入</button>
      </div>
      <a href="/" class="back-link">← 返回游戏大厅</a>
    </div>
  </div>

  <div id="lobby-screen" class="screen">
    <div class="container narrow">
      <div class="room-header">
        <h2>房间号: <span id="room-id-display"></span></h2>
        <button id="copy-room-id" class="btn btn-small btn-secondary">复制</button>
      </div>

      <div class="players-section panel">
        <h3 class="section-title">玩家列表 (<span id="player-count">0</span>/10)</h3>
        <ul id="players-list"></ul>
      </div>

      <div id="host-controls" class="hidden">
        <button id="start-game-btn" class="btn btn-primary">开始游戏</button>
      </div>
      <p id="waiting-message" class="info-text">等待房主开始游戏...</p>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="game-shell">
      <div class="game-topbar">
        <h1 class="game-title">🕵️ 谁是卧底</h1>
        <span>房间 <strong id="game-room-id"></strong></span>
      </div>

      <div class="role-card">
        <div class="muted">你的词语</div>
        <div id="my-word" class="big">-</div>
        <p id="role-note" class="muted">不要直接说出词语，轮流描述后投票。</p>
      </div>

      <div class="status-banner">
        <div>阶段：<strong id="phase-text">等待中</strong></div>
        <div>第 <strong id="round-number">1</strong> 轮 · 存活 <strong id="alive-count">0</strong> 人</div>
        <div id="winner-text" class="hidden"></div>
      </div>

      <div id="game-actions" class="actions"></div>
      <div id="players-grid" class="player-grid"></div>

      <div class="panel">
        <h3 class="section-title">游戏记录</h3>
        <ul id="history-list" class="history-list"></ul>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/session.js"></script>
  <script src="game.js"></script>
</body>
</html>
